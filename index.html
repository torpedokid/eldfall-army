  --bg-roster-header:#161b21;--bg-header:#161b21;
  --border:#333;--border-gold:rgba(180,140,50,0.4);
  --gold:#c9a84c;--gold-dim:#8b6914;
  --crimson:#c0392b;--crimson-dim:#7a1c1c;
  --profane-dim:#6c3483;--stone-light:#5a4f47;
  --teal:#2a9d8f;--teal-dim:#1a6b60;
  --text-primary:#e8dfc8;--text-secondary:#9a8f7a;--text-dim:#5a5248;
  --item-bg:rgba(255,255,255,0.03);--item-border:rgba(255,255,255,0.07);
  --gold-item-bg:rgba(180,140,50,0.05);--gold-item-border:rgba(180,140,50,0.15);
  --purple-item-bg:rgba(108,52,131,0.06);--purple-item-border:rgba(108,52,131,0.2);
  --teal-item-bg:rgba(42,157,143,0.06);--teal-item-border:rgba(42,157,143,0.2);
  --theme-btn-bg:rgba(255,255,255,0.07);--theme-btn-hover:rgba(255,255,255,0.12);
}
[data-theme="light"]{
  --bg-app:#d8cebc;--bg-left:#f5f0e8;--bg-right:#ede5d5;
  --bg-card-hover:rgba(139,105,20,0.08);--bg-card-active:#c4b89a;
  --bg-roster-header:#8a7560;--bg-header:#6b5a45;
  --border:#c8bba0;--border-gold:rgba(139,105,20,0.5);
  --gold:#c9a84c;--gold-dim:#8b6914;
  --crimson:#7a1c1c;--crimson-dim:#7a1c1c;
  --profane-dim:#6c3483;--stone-light:#5a4f47;
  --teal:#1a7a6e;--teal-dim:#155f55;
  --text-primary:#2a1f14;--text-secondary:#4a3728;--text-dim:#8a7560;
  --item-bg:rgba(42,31,20,0.04);--item-border:rgba(139,105,20,0.2);
  --gold-item-bg:rgba(139,105,20,0.06);--gold-item-border:rgba(139,105,20,0.3);
  --purple-item-bg:rgba(108,52,131,0.05);--purple-item-border:rgba(108,52,131,0.25);
  --teal-item-bg:rgba(42,157,143,0.05);--teal-item-border:rgba(42,157,143,0.25);
  --theme-btn-bg:rgba(42,31,20,0.1);--theme-btn-hover:rgba(42,31,20,0.18);
}
[data-theme="light"] .char-card.active .char-name{color:#2a1f14!important}
[data-theme="light"] .char-card.active .char-class{color:#5a3a1a!important}
[data-theme="light"] .char-card.active .attr-val{color:#2a1f14!important}
[data-theme="light"] .char-card.active .attr-key{color:#6b4c2a!important}
[data-theme="light"] .char-card.active .char-cost{color:#2a1f14!important;border-color:#6b4c2a!important}

html,body{height:100%;overflow:hidden}
body{font-family:'Crimson Text',Georgia,serif;background:var(--bg-app);color:var(--text-primary);display:flex;flex-direction:column;transition:background 0.25s,color 0.25s}

.header{background:var(--bg-header);border-bottom:1px solid var(--border-gold);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.286rem;font-weight:700;letter-spacing:3px}
.header-faction{font-family:'Cinzel',serif;color:var(--text-secondary);font-size:0.714rem;letter-spacing:1.5px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.header-pts{font-family:'Cinzel',serif;color:var(--gold);font-size:0.929rem;border:1px solid var(--gold-dim);padding:3px 14px;letter-spacing:1px}
.theme-btn{background:var(--theme-btn-bg);border:1px solid var(--border-gold);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.714rem;letter-spacing:1px;color:var(--gold);display:flex;align-items:center;gap:6px;transition:background 0.15s;white-space:nowrap}
.theme-btn:hover{background:var(--theme-btn-hover)}
.theme-btn .icon{font-size:0.929rem}

.main{display:flex;flex:1;overflow:hidden}

/* LEFT */
.roster{width:360px;min-width:300px;background:var(--bg-left);border-right:1px solid var(--border-gold);overflow-y:auto;flex-shrink:0;transition:background 0.25s}
.roster-header{position:sticky;top:0;z-index:10;background:var(--bg-roster-header);padding:8px 16px;font-family:'Cinzel',serif;font-size:0.643rem;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;border-bottom:1px solid var(--border-gold)}
.char-card{position:relative;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;border-left:3px solid transparent}
.char-card:hover{background:var(--bg-card-hover)}
.char-card.active{background:var(--bg-card-active);border-left:3px solid var(--gold)}
.char-card.active .char-name{color:var(--gold)}
.char-card.active .char-class{color:#a08060}
.char-card.active .attr-val{color:#d4c090}
.char-card.active .attr-key{color:#6a5f4a}
.char-card.active .char-cost{color:var(--gold);border-color:var(--gold-dim)}
/* Creature card */
.char-card.creature{border-left:3px solid transparent}
.char-card.creature.active{border-left:3px solid var(--teal)}
.char-card.creature .char-name{color:var(--teal)}
.char-card.creature.active .char-name{color:var(--teal)}
.char-card.creature .char-class{color:var(--teal);opacity:0.8}

.char-name{font-family:'Cinzel',serif;font-size:0.929rem;font-weight:600;color:var(--text-primary);margin-bottom:2px}
.char-class{font-size:0.786rem;color:var(--crimson);font-style:italic;margin-bottom:8px;font-weight:600}
.char-cost{position:absolute;top:14px;right:14px;font-family:'Cinzel',serif;font-size:0.786rem;color:var(--gold-dim);border:1px solid rgba(139,105,20,0.3);padding:1px 6px;border-radius:2px}
.attrs-row{display:flex;gap:5px;flex-wrap:wrap}
.attr-cell{display:flex;flex-direction:column;align-items:center;min-width:26px}
.attr-key{font-size:0.571rem;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:0.5px}
.attr-val{font-size:0.929rem;font-weight:600;color:var(--text-secondary);line-height:1.2}

.divider{width:1px;background:var(--border-gold);flex-shrink:0}

/* RIGHT */
.detail{flex:1;overflow-y:auto;background:var(--bg-right);transition:background 0.25s}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:0.25}
.empty-state p{font-family:'Cinzel',serif;font-size:0.857rem;color:var(--text-primary);letter-spacing:3px}
.detail-content{padding:24px 32px;max-width:960px}

.detail-name{font-family:'Cinzel',serif;font-size:2.0rem;font-weight:700;color:var(--text-primary);letter-spacing:2px;line-height:1;margin-bottom:8px}
.detail-name.creature-name{color:var(--teal)}
.detail-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:2px}
.class-badge{font-family:'Cinzel',serif;font-size:0.714rem;letter-spacing:1px;padding:3px 10px;border:1px solid;border-radius:2px}
.badge-assassin,.badge-rogue{color:var(--crimson);border-color:var(--crimson-dim);background:rgba(192,57,43,0.1)}
.badge-warrior{color:#c9924c;border-color:#6b4c1c;background:rgba(201,146,76,0.1)}
.badge-ranger{color:#6ab04c;border-color:#3a6b1c;background:rgba(106,176,76,0.08)}
.badge-mage,.badge-enchanter,.badge-wizard,.badge-sorcerer,.badge-summoner,.badge-artificer{color:#6a9cd4;border-color:#2a4d8b;background:rgba(106,156,212,0.1)}
.badge-creature{color:var(--teal);border-color:var(--teal-dim);background:rgba(42,157,143,0.1)}
.cost-badge{margin-left:auto;font-family:'Cinzel',serif;font-size:0.857rem;color:var(--gold);border:1px solid var(--gold-dim);padding:3px 12px}

.gold-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:14px 0}
.section-title{font-family:'Cinzel',serif;font-size:0.714rem;letter-spacing:2.5px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--gold-dim);opacity:0.3}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px}

/* Weapon */
.weapon-card{background:var(--item-bg);border:1px solid var(--item-border);border-left:3px solid var(--crimson-dim);padding:10px 14px;margin-bottom:8px;border-radius:0 4px 4px 0}
.weapon-name{font-family:'Cinzel',serif;font-size:0.929rem;color:var(--text-primary);font-weight:600;margin-bottom:5px}
.weapon-mode{display:inline-block;font-size:0.643rem;font-family:'Cinzel',serif;padding:1px 7px;border-radius:2px;margin-bottom:5px;letter-spacing:0.5px}
.mode-melee{background:rgba(192,57,43,0.15);color:#c0392b;border:1px solid rgba(192,57,43,0.3)}
.mode-ranged{background:rgba(106,156,212,0.12);color:#6a9cd4;border:1px solid rgba(106,156,212,0.3)}
.mode-natural{background:rgba(120,160,80,0.12);color:#8ab55a;border:1px solid rgba(120,160,80,0.3)}
.weapon-stats{display:flex;gap:14px;margin-bottom:5px;flex-wrap:wrap}
.weapon-stat{font-size:0.857rem;color:var(--text-secondary)}
.weapon-stat span{color:var(--text-primary);font-weight:600}
.weapon-effect{font-size:0.857rem;color:var(--text-secondary);font-style:italic;line-height:1.5}

/* Generic items */
.item-card{padding:9px 13px;background:var(--item-bg);border:1px solid var(--item-border);border-radius:4px;margin-bottom:6px}
.item-card.gold-left{border-left:3px solid var(--gold-dim);border-radius:0 4px 4px 0;background:var(--gold-item-bg);border-color:var(--gold-item-border)}
.item-card.crimson-left{border-left:3px solid var(--crimson-dim);border-radius:0 4px 4px 0}
.item-card.stone-left{border-left:3px solid var(--stone-light);border-radius:0 4px 4px 0}
.item-card.purple-left{border-left:3px solid var(--profane-dim);border-radius:0 4px 4px 0;background:var(--purple-item-bg);border-color:var(--purple-item-border)}
.item-card.teal-left{border-left:3px solid var(--teal-dim);border-radius:0 4px 4px 0;background:var(--teal-item-bg);border-color:var(--teal-item-border)}
.item-label{font-size:0.643rem;font-family:'Cinzel',serif;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:2px;text-transform:uppercase}
.item-name{font-family:'Cinzel',serif;font-size:0.857rem;color:var(--text-primary);font-weight:600;margin-bottom:3px}
.item-cost{font-size:0.714rem;color:var(--text-dim);margin-left:4px}
.item-stats{display:flex;gap:14px;margin-bottom:4px;flex-wrap:wrap;align-items:center}
.item-stat{font-size:0.786rem;color:var(--text-secondary)}
.item-stat span{color:var(--text-primary);font-weight:600}
.item-desc{font-size:0.857rem;color:var(--text-secondary);line-height:1.6}

/* Summon button */
.summon-btn{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:6px;padding:4px 12px;
  background:rgba(42,157,143,0.15);
  border:1px solid var(--teal-dim);
  border-radius:3px;
  font-family:'Cinzel',serif;font-size:0.643rem;letter-spacing:1px;
  color:var(--teal);cursor:pointer;transition:background 0.15s;
}
.summon-btn:hover{background:rgba(42,157,143,0.28)}

/* Dismiss button */
.dismiss-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 16px;
  background:rgba(192,57,43,0.12);
  border:1px solid var(--crimson-dim);
  border-radius:3px;
  font-family:'Cinzel',serif;font-size:0.714rem;letter-spacing:1px;
  color:var(--crimson);cursor:pointer;transition:background 0.15s;
}
.dismiss-btn:hover{background:rgba(192,57,43,0.25)}

/* Element badges */
.el-badge{font-size:0.643rem;font-family:'Cinzel',serif;padding:1px 5px;border-radius:2px;margin-left:6px;vertical-align:middle}
.el-fire{background:rgba(192,57,43,0.15);color:#e67e52;border:1px solid rgba(192,57,43,0.3)}
.el-profane{background:rgba(108,52,131,0.15);color:#b97fd4;border:1px solid rgba(108,52,131,0.3)}
.el-water{background:rgba(52,152,219,0.12);color:#7ab8d4;border:1px solid rgba(52,152,219,0.25)}
.el-elder{background:rgba(180,140,50,0.12);color:#c9a84c;border:1px solid rgba(180,140,50,0.25)}
.el-air{background:rgba(149,204,202,0.12);color:#95ccca;border:1px solid rgba(149,204,202,0.25)}
.el-earth{background:rgba(120,160,80,0.12);color:#8ab55a;border:1px solid rgba(120,160,80,0.25)}
.el-divine{background:rgba(240,220,120,0.12);color:#e0cc60;border:1px solid rgba(240,220,120,0.25)}
.el-any{background:rgba(150,150,150,0.12);color:#aaa;border:1px solid rgba(150,150,150,0.25)}

/* ── ACORDEONES TÁCTILES ── */
.accordion{
  border-radius:4px;
  margin-bottom:6px;
  overflow:hidden;
}
.accordion-trigger{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:12px 14px;
  background:var(--item-bg);border:1px solid var(--item-border);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background 0.15s;
  border-radius:4px;
  gap:8px;
}
.accordion-trigger:active{background:var(--bg-card-hover)}
.accordion.open .accordion-trigger{
  border-radius:4px 4px 0 0;
  border-bottom-color:transparent;
}
.accordion-trigger-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.accordion-chevron{
  font-size:0.714rem;color:var(--text-dim);
  transition:transform 0.2s;flex-shrink:0;
}
.accordion.open .accordion-chevron{transform:rotate(180deg)}
.accordion-body{
  display:none;
  padding:10px 14px 12px;
  background:var(--item-bg);
  border:1px solid var(--item-border);border-top:none;
  border-radius:0 0 4px 4px;
  font-size:0.857rem;color:var(--text-secondary);line-height:1.6;
}
.accordion.open .accordion-body{display:block}

/* Class badge pulsable */
.class-badge{
  font-family:'Cinzel',serif;font-size:0.714rem;letter-spacing:1px;
  padding:6px 12px;border:1px solid;border-radius:4px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity 0.15s;user-select:none;
  display:inline-flex;align-items:center;gap:5px;
}
.class-badge:active{opacity:0.7}
.class-badge .badge-chevron{font-size:0.571rem;transition:transform 0.2s}
.class-badge.open .badge-chevron{transform:rotate(180deg)}

/* Class description panel */
.class-desc-panel{
  display:none;
  margin-top:4px;margin-bottom:4px;
  padding:10px 14px;
  background:var(--item-bg);border:1px solid var(--item-border);
  border-radius:4px;
  font-size:0.857rem;color:var(--text-secondary);line-height:1.6;
}
.class-desc-panel.open{display:block}

/* Weapon category badge pulsable */
.weapon-cat{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.643rem;font-family:'Cinzel',serif;
  padding:3px 8px;border-radius:2px;margin-bottom:5px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  letter-spacing:0.5px;user-select:none;
  transition:opacity 0.15s;
}
.weapon-cat:active{opacity:0.7}
.weapon-cat .cat-chevron{font-size:0.571rem;transition:transform 0.2s}
.weapon-cat.open .cat-chevron{transform:rotate(180deg)}
.cat-desc{
  display:none;margin-top:4px;margin-bottom:4px;
  padding:8px 12px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--item-border);border-radius:3px;
  font-size:0.786rem;color:var(--text-secondary);
  font-style:italic;line-height:1.5;
}
.cat-desc.open{display:block}

.spell-unavailable .item-name::after{content:' · no affinity';font-size:0.643rem;color:var(--text-dim);font-style:italic;font-family:'Crimson Text',serif;font-weight:400;margin-left:4px}
.no-items{font-size:0.857rem;color:var(--text-dim);font-style:italic;padding:4px 0}

/* Glossary terms */
.glossary-term{
  color:var(--gold);
  border-bottom:1px dotted var(--gold-dim);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  display:inline;
}
.glossary-term:active{opacity:0.7}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(128,128,128,0.05)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

</script>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">⚔ Eldfall Chronicles</div>
    <div class="header-faction" id="header-faction">Army Viewer</div>
  </div>
  <div class="header-right">
    <div class="header-pts" id="header-pts">— pts</div>
    <button class="theme-btn" onclick="document.getElementById('army-file-input').click()">
      <span class="icon">📂</span><span>Load</span>
    </button>
    <input type="file" id="army-file-input" accept=".json" style="display:none">
    <button class="theme-btn" onclick="toggleFont()" id="font-btn"><span class="icon">𝐀</span><span>A+</span></button>
    <button class="theme-btn" onclick="exportPDF()" id="export-btn"><span class="icon">📄</span><span>PDF</span></button>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn"><span class="icon">☀️</span><span>Light</span></button>
  </div>
</div>
<div class="main">
  <div class="roster">
    <div class="roster-header" id="roster-header">Warband</div>
    <div id="roster-list"></div>
  </div>
  <div class="divider"></div>
  <div class="detail" id="detail-panel">
    <div class="empty-state"><p>⚔ Select a fighter</p></div>
  </div>
</div>

<script>


// ── THEME / FONT ──────────────────────────────────────────────────────────────
function toggleFont(){
  const isLg = document.documentElement.classList.toggle('text-lg');
  document.getElementById('font-btn').innerHTML = isLg
    ? '<span class="icon">𝐚</span><span>A-</span>'
    : '<span class="icon">𝐀</span><span>A+</span>';
}
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('theme-btn').innerHTML = isDark
    ? '<span class="icon">🌙</span><span>Dark</span>'
    : '<span class="icon">☀️</span><span>Light</span>';
}

// ── CLASS DESCRIPTIONS ────────────────────────────────────────────────────────
const CLASS_DESC = {
  ASSASSIN: "Critical Hit on roll results of 1, 2, or 3 (instead of only 1).",
  ROGUE: "Once per Activation, on at least one successful Hit, may perform an AG roll. If successful, the Hit gains Knockdown.",
  WARRIOR: "During Strategic Phase, may enter Defensive Stance (token). In Defensive Stance: STK 1 in Active Role, default STK in Reactive Role. Lasts until next Strategic Phase.",
  RANGER: "In the End Phase of the Active Role, may perform a Normal Movement (does not provoke Reactions).",
  MAGE: "When casting a Spell, may spend an unspent AP to Reroll any number of dice. Can convert APs into Mana Counters (cumulative, don't disappear).",
  ENCHANTER: "May cast Enchantment-Type Spells on allied models without performing a roll.",

// ── EVENT DELEGATION para acordeones (evita problemas con comillas en template literals) ──
document.addEventListener('click', function(e){
  const t = e.target.closest('[data-toggle]');
  if(!t) return;
  const action = t.getAttribute('data-toggle');
  const id     = t.getAttribute('data-id');
  if(action === 'class'){
    const term = t.getAttribute('data-term');
    if(term) openGlossary(term);
  } else if(action === 'cat'){
    const term = t.getAttribute('data-term');
    if(term) openGlossary(term);
  } else if(action === 'glossary'){
    const term = t.getAttribute('data-term');
    if(term) openGlossary(term);
  } else if(action === 'dismiss'){
    const iid = parseFloat(t.getAttribute('data-iid'));
    if(iid) dismissCreature(iid);
  } else if(action === 'summon'){
    const creature = t.getAttribute('data-creature');
    if(creature) summonCreature(creature);
  } else if(action === 'accordion'){
    const term = t.getAttribute('data-term');
    if(term) openGlossary(term);
  }
});

// ── STATE ─────────────────────────────────────────────────────────────────────
let ARMY = [...BASE_ARMY];
let selected = null;
let summonedCreatures = []; // {id, creatureName, instanceId}
let _armyPtsFromJSON = null; // set when loading from JSON

function totalPts(){
  if(_armyPtsFromJSON !== null) return _armyPtsFromJSON;
  return BASE_ARMY.reduce((s,c)=>{
    const upgCost = (c.upgrades||[]).reduce((u,upg)=>u+(upg.cost||0),0);
    return s + (c.cost||0) + upgCost;
  },0);
}

// ── HEADER ────────────────────────────────────────────────────────────────────
let _currentFaction = 'Sand Kingdoms';

function updateHeader(){
  document.getElementById('header-faction').textContent = _currentFaction + ' · Army Viewer';
  document.getElementById('header-pts').textContent = totalPts()+' pts';
  const count = ARMY.length;
  document.getElementById('roster-header').textContent =
    `Warband — ${count} fighter${count!==1?'s':''}`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function classColor(cls){
  const map={ASSASSIN:'assassin',ROGUE:'rogue',WARRIOR:'warrior',RANGER:'ranger',
    MAGE:'mage',ENCHANTER:'enchanter',WIZARD:'mage',SORCERER:'mage',
    SUMMONER:'mage',ARTIFICER:'mage',CREATURE:'creature'};
  return map[cls]||'mage';
}
function elBadge(el){
  return `<span class="el-badge el-${el.toLowerCase()}">${el}</span>`;
}
function sec(title,html){
  return html?`<div class="section-title">${title}</div>${html}`:'';
}

// ── SUMMON / DISMISS ──────────────────────────────────────────────────────────
function summonCreature(creatureName){
  const template = CREATURES[creatureName];
  if(!template) return;
  const instanceId = Date.now()+Math.random();
  const instance = {
    ...JSON.parse(JSON.stringify(template)),
    _instanceId: instanceId,
    _summonedBy: creatureName,
    name: template.name,
    cost: 0,
  };
  ARMY.push(instance);
  summonedCreatures.push({creatureName, instanceId});
  renderRoster();
  updateHeader();
  // Select the new creature
  selectChar(ARMY.length-1);
}

function dismissCreature(instanceId){
  const idx = ARMY.findIndex(c=>c._instanceId===instanceId);
  if(idx===-1) return;
  ARMY.splice(idx,1);
  summonedCreatures = summonedCreatures.filter(s=>s.instanceId!==instanceId);
  // Reselect safely
  if(selected>=ARMY.length) selected=ARMY.length-1;
  renderRoster();
  updateHeader();
  if(selected>=0) renderDetail(ARMY[selected]);
  else document.getElementById('detail-panel').innerHTML='<div class="empty-state"><p>⚔ Select a fighter</p></div>';
}

  document.getElementById('roster-list').innerHTML = ARMY.map((c,i)=>{

// ── JSON PARSER ───────────────────────────────────────────────────────────────

function getTraitName(t){
  let n = t.name__ || null;
  if(!n){
    const td = t.trait?.data?.attributes;
    if(td) n = td.name__ || '?';
  }
  if(!n) return '?';
  // Replace (Element) with dynamic_elements
  const de = t.dynamic_elements?.data || [];
  if(de.length){
    const els = de.map(e=>e.attributes.name).join(', ');
    n = n.replace(/\(Element\)/i, `(${els})`);
  }
  // Replace (X...) with dynamic_value
  const dv = t.dynamic_value;
  if(dv) n = n.replace(/\(X[^)]*\)/i, `(${dv})`);
  return n;
}

function getTraitDesc(t){
  return cleanEffect(t.trait?.data?.attributes?.description || '');
}

function getAffinities(traits){
  const affs = [];
  for(const t of traits){
    const name = getTraitName(t);
    const de = t.dynamic_elements?.data || [];
    if(/Affinity/i.test(name)){
      if(de.length){
        de.forEach(e => affs.push(e.attributes.name));
      } else {
        const m = name.match(/Affinity\s*\(([^)]+)\)/i);
        if(m) m[1].split(',').forEach(el => affs.push(el.trim()));
      }
    }
  }
  return affs;
}

function cleanEffect(text){
  if(!text) return '-';
  return String(text).replace(/\(([^)]+)\)\[[^\]]+\]/g, '$1').trim();
}

// Peso que aporta un item al Inventario, según las reglas del juego (p.13):
// "WGT se multiplica por QTY, salvo que WGT sea 0 — en ese caso solo cuenta QTY."
// Items con WGT "/" no ocupan espacio en absoluto (armas naturales, etc.)
function itemWeightContribution(w){
  if(w.WGT === '/' || w.WGT == null) return 0;
  const wgtNum = parseFloat(w.WGT);
  if(isNaN(wgtNum)) return 0;
  const qty = w.qty || 1;
  return wgtNum === 0 ? qty : wgtNum * qty;
}

function parseWeaponMode(w){
  const modeObj = w.attack_mode;
  if(typeof modeObj === 'string') return modeObj;
  if(Array.isArray(modeObj) && modeObj[0]?.mode) return modeObj[0].mode;
  if(typeof modeObj === 'object' && modeObj?.mode) return modeObj.mode;
  const type = w.item_type || '';
  if(typeof type === 'string') return type || 'MELEE';
  return 'MELEE';
}

function parseSpellGroup(sp){
  const sg = sp.spell_group?.data?.attributes || {};
  return {
    code: sg.code || '',
    name: sg.name || sp.name__ || '?',
    level: sp.level || 1,
  };
}

function parseArmy(data){
  const chars = data.armyCharacterList || [];
  const factionRaw = data.faction?.attributes?.name || chars[0]?.attributes?.factions?.data?.[0]?.attributes?.name || 'Unknown';
  const totalPts = data.armyPts || chars.reduce((s,c)=>{
    const upgCost = (c.attributes.appliedArmyCharacterUpgrades||[])
      .reduce((u,upg)=>u+(upg.upgrade?.attributes?.cost||0),0);
    return s + c.attributes.recruitment_cost + upgCost;
  }, 0);

  const parsed = chars.map(c=>{
    const a = c.attributes;
    const attrs = a.attributes;
    const traits = a.traits || [];
    const affinities = getAffinities(traits);

    // Skills — description may be in attributes.description or attributes.desc
    const skills = a.skills.data.map(s=>{
      const sa = s.attributes;
      const group = sa.skill_group?.data?.attributes?.name || null;
      return {
        name: sa.name__ || '?',
        desc: cleanEffect(sa.description || sa.desc || ''),
        group: group,
        level: sa.level || null,
      };
    });

    // Combat Arts
    const arts = a.combat_arts.data.map(s=>{
      const sa = s.attributes;
      const group = sa.combat_art_group?.data?.attributes?.name || null;
      return {
        name: sa.name__ || '?',
        desc: cleanEffect(sa.description || sa.desc || ''),
        group: group,
        level: sa.level || null,
      };
    });

    // Traits
    const traitList = traits.map(t=>({
      name: getTraitName(t),
      desc: getTraitDesc(t),
      group: t.trait?.data?.attributes?.trait_group?.data?.attributes?.name || null,
      level: t.trait?.data?.attributes?.level || null,
    })).filter(t=>t.name && t.name !== '?');

    // Weapons
    const inv = a.inventory || {};
    const space = inv.space || null;
    const weapons = (inv.items || []).map(item=>{
      const w = item.item.data.attributes;
      const mode = parseWeaponMode(w);
      return {
        name: w.name || '?',
        mode: mode,
        qty: item.QTY != null ? item.QTY : 1,
        PW: w.PW || '-',
        RCH: w.RCH || '-',
        STK: w.STK || '-',
        WGT: w.WGT != null ? String(w.WGT) : '-',
        effect: cleanEffect(w.effect),
      };
    });

    // Spellcrafts
    const spellcrafts = (a.spellcrafts || []).map(sp=>{
      const sg = parseSpellGroup(sp);
      return { code: sg.code, name: sg.name, level: sg.level };
    });

    // Upgrades
    const upgrades = (a.appliedArmyCharacterUpgrades || []).map(u=>{
      const ua = u.upgrade.attributes;
      return { name: ua.name || '?', cost: ua.cost || 0, desc: cleanEffect(ua.description || '') };
    });

    // Stratagems
    const stratRaw = a.stratagems;
    const stratList = Array.isArray(stratRaw)
      ? stratRaw
      : (stratRaw?.data || []);
    const stratagems = stratList.map(s=>{
      const sa = s.attributes || s;
      return {
        name: sa.name || '?',
        type: sa.type || '',
        effect: cleanEffect(sa.effect),
      };
    });

    return {
      name: a.name,
      cost: a.recruitment_cost,
      size: a.size_info?.size || 'Medium',
      inventorySpace: space,
      classes: a.classes.data.map(cl=>cl.attributes.name),
      attrs: Object.fromEntries(
        ['STA','SPD','OFF','DEF','ACC','INT','AG','T','ARM','HP','M']
          .map(k=>[k, attrs[k]?.value ?? 0])
      ),
      affinities,
      weapons,
      skills,
      arts,
      traits: traitList,
      upgrades,
      spellcrafts,
      stratagems,
    };
  });

  return { faction: factionRaw, totalPts, chars: parsed };
}

function loadArmyFromJSON(jsonData){
  try {
    const parsed = parseArmy(jsonData);
    BASE_ARMY.length = 0;
    parsed.chars.forEach(c => BASE_ARMY.push(c));
    ARMY.length = 0;
    ARMY.push(...BASE_ARMY);
    summonedCreatures.length = 0;
    selected = null;
    _armyPtsFromJSON = parsed.totalPts;
    _currentFaction = parsed.faction;

    // Update header faction

    document.getElementById('detail-panel').innerHTML =
      '<div class="empty-state"><p>⚔ Select a fighter</p></div>';

    updateHeader();
    renderRoster();
    if(ARMY.length > 0) selectChar(0);
  } catch(e){
    alert('Error loading army: ' + e.message);
    console.error(e);
  }
}

// ── FILE INPUT HANDLER ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('army-file-input').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try {
        const data = JSON.parse(ev.target.result);
        loadArmyFromJSON(data);
      } catch(err){
        alert('Invalid JSON file: ' + err.message);
      }
    };
    reader.readAsText(file);
    // Reset so same file can be loaded again
    e.target.value = '';
  });
});

// ── EXPORT PDF ───────────────────────────────────────────────────────────────
function exportPDF(){
  if(typeof window.jspdf === 'undefined'){
    alert('PDF library not loaded. Please check your internet connection and try again.');
    return;
  }
  const btn = document.getElementById('export-btn');
  btn.innerHTML = '<span class="icon">⏳</span><span>...</span>';
  btn.style.opacity = '0.6';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

    // ── Constants ──
    const PW=210, PH=297, ML=12, MR=12, MT=12, MB=10;
    const CW=PW-ML-MR, PAD=3, LHSM=4.2, LHN=5.2, CORNER=2;
    const COL2=(CW-4)/2; // two-column width

    // ── Colors (all light, print-friendly) ──
    const BLACK  = [0,0,0];
    const DGRAY  = [40,40,40];
    const MGRAY  = [100,100,100];
    const LGRAY  = [200,200,200];
    const XLGRAY = [240,240,240];
    const WHITE  = [255,255,255];
    const GOLD   = [120,85,10];
    const CRIM   = [140,20,20];
    const PURP   = [90,30,120];
    const STONE  = [70,60,50];
    const TEAL   = [20,100,90];

    // ── Helpers ──
    function sf(style,size,color){ doc.setFont('helvetica',style); doc.setFontSize(size); if(color) doc.setTextColor(...color); }
    function tw(s){ return doc.getTextWidth(String(s)); }
    function setDraw(color,lw){ doc.setDrawColor(...color); doc.setLineWidth(lw||0.25); }
    function setFill(color){ doc.setFillColor(...color); }

    // Wrapped text — returns new y
    function wt(text, x, y, maxW, lh, font, size, color){
      sf(font||'normal', size||8, color||DGRAY);
      const lines = doc.splitTextToSize(String(text||''), maxW);
      doc.text(lines, x, y);
      return y + lines.length*(lh||LHSM);
    }

    // Section header bar (thin, dark text, light bg)
    function sectionBar(title, x, y, w, color){
      setFill(XLGRAY); setDraw(color||LGRAY, 0.3);
      doc.rect(x, y, w, 5.5, 'FD');
      // left accent strip
      setFill(color||STONE);
      doc.rect(x, y, 1.5, 5.5, 'F');
      sf('bold', 7, color||STONE);
      doc.text(title.toUpperCase(), x+3.5, y+3.9);
      return y+6;
    }

    // Box outline only (no fill) — returns inner start y
    function boxOutline(x, y, w, h, accentColor){
      setFill(WHITE); setDraw(accentColor||LGRAY, 0.3);
      doc.roundedRect(x, y, w, h, CORNER, CORNER, 'FD');
    }

    // Measure wrapped lines height
    function linesH(text, maxW, lh, size){
      const tmp = doc.getFontSize();
      if(size) doc.setFontSize(size);
      const n = doc.splitTextToSize(String(text||''), maxW).length;
      doc.setFontSize(tmp);
      return n*(lh||LHSM);
    }

    // ── State ──
    let curPage = 1;
    let y = MT;

    function newPage(){
      doc.addPage();
      setFill(WHITE); doc.rect(0,0,PW,PH,'F');
      y = MT;
      curPage++;
    }

    function ensureSpace(needed){
      if(y + needed > PH - MB) newPage();
    }

    // ── Stat block (horizontal) ──
    function drawStats(c, x){
      const ATTRS=['STA','SPD','OFF','DEF','ACC','INT','AG','T','ARM','HP','M'];
      const cw = CW/ATTRS.length;
      ATTRS.forEach((k,i)=>{
        const cx = x + i*cw;
        setFill(XLGRAY); setDraw(LGRAY,0.2);
        doc.rect(cx, y, cw, 10, 'FD');
        sf('bold',5.5,MGRAY); doc.text(k, cx+cw/2, y+3.5,{align:'center'});
        sf('bold',9,DGRAY);   doc.text(String(c.attrs[k]??0), cx+cw/2, y+8.5,{align:'center'});
      });
      y += 11;
    }

    // ── Weapon block ── returns height consumed
    function weaponH(w, maxW){
      let h = 5.5; // name line
      const stats=[w.PW,w.RCH,w.STK,w.WGT].filter(v=>v&&v!=='-'&&v!=='/');
      if(stats.length) h+=LHSM;
      if(w.effect&&w.effect!=='-') h+=linesH(w.effect, maxW-3, LHSM, 7)+0.5;
      return h+1.5;
    }
    function drawWeapon(w, x, maxW){
      const nameStr = w.name + (w.qty>1 ? ` ×${w.qty}` : '');
      sf('bold',8,DGRAY); doc.text(nameStr, x, y+3.5);
      const mode=w.mode||'MELEE';
      const mc=mode==='RANGED'?TEAL:mode==='NATURAL'?STONE:CRIM;
      const bw=tw(mode)+3;
      setFill(mc); doc.roundedRect(x+maxW-bw, y+1, bw, 3.5, 0.8,0.8,'F');
      sf('bold',5.5,WHITE); doc.text(mode, x+maxW-bw/2, y+3.6,{align:'center'});
      y+=6.5;
      const stats=[]; 
      if(w.PW&&w.PW!=='-') stats.push('PW: '+w.PW);
      if(w.RCH&&w.RCH!=='-') stats.push('RCH: '+w.RCH);
      if(w.STK&&w.STK!=='-') stats.push('STK: '+w.STK);
      if(w.WGT&&w.WGT!=='/'&&w.WGT!=='-') stats.push('WGT: '+w.WGT);
      if(stats.length){ sf('normal',7,MGRAY); doc.text(stats.join('  ·  '),x,y); y+=LHSM; }
      if(w.effect&&w.effect!=='-'){ y=wt(w.effect,x,y,maxW-3,LHSM,'italic',7,MGRAY)+0.5; }
      y+=1.5;
    }

    // ── Generic named+desc item ──
    function itemH(it, maxW, size){
      let h = size||7.5;
      if(it.desc) h+=linesH(it.desc,maxW-3,LHSM,7);
      return h+2;
    }
    function drawItem(name, desc, x, maxW, nameColor){
      sf('bold',7.5,nameColor||DGRAY); doc.text(name,x,y+3.5); y+=6.5;
      if(desc){ y=wt(desc,x,y,maxW-3,LHSM,'normal',7,MGRAY); }
      y+=2;
    }

    // ── Leveled Skill/Trait (e.g. Stealth II, Resourceful II) — mirrors Combat Art logic ──
    function getLeveledInfo(item){
      const m = item.name.match(/^(.+?)\s+(\d+)$/);
      const base = item.group || (m ? m[1] : null);
      const maxLv = item.level || (m ? parseInt(m[2]) : null);
      const levelData = base ? LEVELED_SKILLS[base] : null;
      if(!levelData || !maxLv) return null;
      return { base, levels: levelData.filter(l=>l.level<=maxLv), maxLv };
    }
    function leveledItemH(item, maxW){
      const info = getLeveledInfo(item);
      if(!info) return itemH(item, maxW);
      let h=5;
      for(const l of info.levels){ h+=5; h+=linesH(l.desc,maxW-7,LHSM-0.3,6.5)+1; }
      return h+2;
    }
    function drawLeveledItem(item, x, maxW, color){
      const info = getLeveledInfo(item);
      if(!info){ drawItem(item.name, item.desc, x, maxW, color); return; }
      sf('bold',7,color||DGRAY); doc.text(info.base,x,y+3.5); y+=6.5;
      for(const l of info.levels){
        const active = l.level===info.maxLv;
        const rn=['I','II','III','IV','V'][l.level-1];
        sf('bold',7,active?(color||DGRAY):MGRAY);
        doc.text(`${rn}  ${info.base}${active?' ★':''}`,x+3,y+3.5); y+=6.5;
        const lines=doc.splitTextToSize(l.desc,maxW-7);
        sf('normal',6.5,MGRAY); doc.text(lines,x+6,y); y+=lines.length*(LHSM-0.3)+1;
      }
      y+=2;
    }

    // ── markTerms for HTML rendering ──
    function mt(text){ return markTerms(text); }

    // ── Combat art (all levels) ──
    function combatArtH(a, maxW){
      const m=a.name.match(/^(.+?)\s+(\d+)$/);
      const base=a.group||(m?m[1]:a.name), maxLv=a.level||(m?parseInt(m[2]):1);
      const levels=(COMBAT_ARTS[base]||[]).filter(l=>l.level<=maxLv);
      if(!levels.length) return 8;
      let h=5; // group label
      for(const l of levels){ h+=5; h+=linesH(l.desc,maxW-7,LHSM-0.3,6.5)+1; }
      return h+2;
    }
    function drawCombatArt(a, x, maxW){
      const m=a.name.match(/^(.+?)\s+(\d+)$/);
      const base=a.group||(m?m[1]:a.name), maxLv=a.level||(m?parseInt(m[2]):1);
      const levels=(COMBAT_ARTS[base]||[]).filter(l=>l.level<=maxLv);
      if(!levels.length){ sf('bold',7.5,CRIM); doc.text(a.name,x,y+3.5); y+=8; return; }
      sf('bold',7,CRIM); doc.text(base.toUpperCase(),x,y+3.5); y+=6.5;
      for(const l of levels){
        const active=l.level===maxLv;
        const rn=['I','II','III','IV','V'][l.level-1];
        sf('bold',7,active?CRIM:MGRAY);
        doc.text(`${rn}  ${l.name}${active?' ★':''}`,x+3,y+3.5); y+=6.5;
        const lines=doc.splitTextToSize(l.desc,maxW-7);
        sf('normal',6.5,MGRAY); doc.text(lines,x+6,y); y+=lines.length*(LHSM-0.3)+1;
      }
      y+=2;
    }

    // ── Spell block ──
    function spellH(s, maxW){
      let h=5.5;
      const stats=[s.PW,s.RCH,s.STK].filter(v=>v&&v!=='-');
      if(stats.length||s.manaCost) h+=LHSM;
      if(s.effect) h+=linesH(s.effect,maxW-3,LHSM-0.3,6.5);
      return h+2;
    }
    function drawSpell(s, hasAff, x, maxW){
      const dc=hasAff?DGRAY:LGRAY;
      sf('bold',7.5,dc); doc.text(s.name,x,y+3.5);
      const elColors={Fire:CRIM,Profane:PURP,Water:TEAL,Elder:GOLD,Air:[40,100,100],Earth:STONE,Divine:GOLD};
      const ec=elColors[s.element]||STONE;
      const ew=tw(s.element)+3;
      setFill(ec); doc.roundedRect(x+maxW-ew, y+1, ew, 3.5, 0.8,0.8,'F');
      sf('bold',5.5,WHITE); doc.text(s.element, x+maxW-ew/2, y+3.6,{align:'center'});
      y+=6.5;
      const stats=[];
      if(s.PW&&s.PW!=='-') stats.push('PW: '+s.PW);
      if(s.RCH) stats.push('RCH: '+s.RCH);
      if(s.STK&&s.STK!=='-') stats.push('STK: '+s.STK);
      if(s.manaCost) stats.push('Mana: '+s.manaCost);
      if(stats.length){ sf('normal',6.5,hasAff?MGRAY:LGRAY); doc.text(stats.join('  '),x,y); y+=LHSM; }
      if(s.effect){
        const lines=doc.splitTextToSize(s.effect,maxW-3);
        sf('italic',6.5,hasAff?MGRAY:LGRAY); doc.text(lines,x,y); y+=lines.length*(LHSM-0.3);
      }
      y+=2;
    }

    // ── SECTION BLOCK: draws a titled section with items inside, handles page breaks ──
    function drawSection(title, accentColor, contentFn, heightFn){
      const h = heightFn() + 7;
      // If section doesn't fit at all and we're not near top, new page
      if(y + Math.min(h, 40) > PH - MB && y > MT + 30) newPage();
      const startY = y;
      y = sectionBar(title, ML, y, CW, accentColor);
      contentFn();
      // bottom padding
      y += 2;
      // thin outline around whole section
      setDraw(accentColor||LGRAY, 0.2);
      doc.roundedRect(ML, startY, CW, y-startY, CORNER, CORNER, 'S');
      y += 3; // gap after section
    }

    // ── RENDER ONE CHARACTER ──
    function renderChar(c){
      // Always start on new page (except first char on first page)
      if(curPage>1 || y>MT) newPage();
      else { setFill(WHITE); doc.rect(0,0,PW,PH,'F'); }

      // ── CHARACTER HEADER ──
      // outline box, white bg
      setFill(WHITE); setDraw(DGRAY, 0.4);
      doc.roundedRect(ML, y, CW, 14, CORNER, CORNER, 'FD');
      // left accent strip
      setFill(DGRAY); doc.roundedRect(ML, y, 2, 14, CORNER, CORNER, 'F');
      doc.rect(ML+CORNER, y, 2-CORNER, 14, 'F');
      sf('bold',16,DGRAY); doc.text(c.name+(c.isCreature?' — Creature Tier '+c.tier:''), ML+5, y+9);
      sf('normal',7.5,MGRAY);
      doc.text(c.classes.join(' · ')+'  ·  '+c.size, ML+5, y+12.5);
      if(!c.isCreature){
        sf('bold',10,GOLD); doc.text(c.cost+' pts', ML+CW-3, y+9, {align:'right'});
      }
      // gold rule
      setFill(GOLD); doc.rect(ML, y+14, CW, 0.5, 'F');
      y += 16;

      // ── STATS ──
      drawStats(c, ML);

      // Inventory
      if(c.inventorySpace){
        const used=c.weapons.reduce((s,w)=>s+itemWeightContribution(w),0);
        const over=used>c.inventorySpace;
        sf('normal',7,over?CRIM:MGRAY);
        doc.text(`Inventory: ${used} / ${c.inventorySpace} wgt${over?' ⚠ OVER-ENCUMBERED':''}`, ML, y+3.5);
        y+=6;
      } else { y+=1; }

      // ── TWO COLUMN: weapons (L) + skills/arts/traits (R) ──
      // We render both columns in parallel using saved y positions
      const xL=ML, xR=ML+COL2+4;
      const yStart=y;

      // --- LEFT COLUMN ---
      let yL=yStart;

      // Weapons
      const wTitle='Weapons';
      const wH=c.weapons.reduce((s,w)=>s+weaponH(w,COL2-PAD*2),0)+7+2;
      const wStartY=yL;
      yL = sectionBar(wTitle, xL, yL, COL2, CRIM);
      for(let i=0;i<c.weapons.length;i++){
        y=yL; drawWeapon(c.weapons[i], xL+PAD, COL2-PAD*2); yL=y;
        if(i<c.weapons.length-1){ setDraw(LGRAY,0.15); doc.line(xL+PAD,yL,xL+COL2-PAD,yL); yL+=1; }
      }
      yL+=2;
      setDraw(CRIM,0.2); doc.roundedRect(xL,wStartY,COL2,yL-wStartY,CORNER,CORNER,'S');
      yL+=3;

      // Upgrades (left)
      if(c.upgrades&&c.upgrades.length){
        const uStartY=yL;
        yL=sectionBar('Upgrades',xL,yL,COL2,GOLD);
        for(const u of c.upgrades){
          y=yL; drawItem(u.name+(u.cost?` (${u.cost}pts)`:''), u.desc, xL+PAD, COL2-PAD*2, GOLD); yL=y;
        }
        yL+=1;
        setDraw(GOLD,0.2); doc.roundedRect(xL,uStartY,COL2,yL-uStartY,CORNER,CORNER,'S');
        yL+=3;
      }

      // --- RIGHT COLUMN ---
      let yR=yStart;

      // Skills
      if(c.skills&&c.skills.length){
        const sStartY=yR;
        yR=sectionBar('Skills',xR,yR,COL2,STONE);
        for(const s of c.skills){
          y=yR; drawLeveledItem(s,xR+PAD,COL2-PAD*2,DGRAY); yR=y;
        }
        yR+=1;
        setDraw(STONE,0.2); doc.roundedRect(xR,sStartY,COL2,yR-sStartY,CORNER,CORNER,'S');
        yR+=3;
      }

      // Combat Arts
      if(c.arts&&c.arts.length){
        const aStartY=yR;
        yR=sectionBar('Combat Arts',xR,yR,COL2,CRIM);
        for(const a of c.arts){
          y=yR; drawCombatArt(a,xR+PAD,COL2-PAD*2); yR=y;
        }
        yR+=1;
        setDraw(CRIM,0.2); doc.roundedRect(xR,aStartY,COL2,yR-aStartY,CORNER,CORNER,'S');
        yR+=3;
      }

      // Traits
      if(c.traits&&c.traits.length){
        const tStartY=yR;
        yR=sectionBar('Traits',xR,yR,COL2,PURP);
        for(const t of c.traits){
          y=yR; drawLeveledItem(t,xR+PAD,COL2-PAD*2,PURP); yR=y;
        }
        yR+=1;
        setDraw(PURP,0.2); doc.roundedRect(xR,tStartY,COL2,yR-tStartY,CORNER,CORNER,'S');
        yR+=3;
      }

      // ── SYNC columns ──
      y = Math.max(yL, yR);

      // ── FULL WIDTH: Spellcrafts ──
      if(c.spellcrafts&&c.spellcrafts.length){
        for(const sc of c.spellcrafts){
          const book=SPELLBOOK[sc.code];
          if(!book) continue;
          const avail=sc.singleSpell?book.spells:book.spells.filter(s=>s.level<=sc.level);
          if(!avail.length) continue;

          // Two-column spell layout
          const half=Math.ceil(avail.length/2);
          const left=avail.slice(0,half), right=avail.slice(half);

          const scTitle=`${sc.name} · Lv ${sc.level}  |  Affinities: ${c.affinities.join(', ')||'—'}`;
          const scStartY=y;
          if(y+20>PH-MB){ newPage(); }
          y=sectionBar(scTitle,ML,y,CW,STONE);

          const xSL=ML+PAD, xSR=ML+COL2+4+PAD;
          let ySL=y, ySR=y;

          for(const s of left){
            const hasAff=s.element==='Any'||c.affinities.includes(s.element);
            if(ySL+spellH(s,COL2-PAD*2)>PH-MB){
              // finish right col first on this page, then new page
              y=Math.max(ySL,ySR);
              setDraw(STONE,0.2); doc.roundedRect(ML,scStartY,CW,y+2-scStartY,CORNER,CORNER,'S');
              newPage();
              ySL=y; ySR=y;
            }
            y=ySL; drawSpell(s,hasAff,xSL,COL2-PAD*2); ySL=y;
          }
          for(const s of right){
            const hasAff=s.element==='Any'||c.affinities.includes(s.element);
            y=ySR; drawSpell(s,hasAff,xSR,COL2-PAD*2); ySR=y;
          }
          y=Math.max(ySL,ySR)+2;
          setDraw(STONE,0.2); doc.roundedRect(ML,scStartY,CW,y-scStartY,CORNER,CORNER,'S');
          y+=3;
        }
      }

      // ── FULL WIDTH: Stratagems ──
      if(c.stratagems&&c.stratagems.length){
        if(y+20>PH-MB) newPage();
        const stStartY=y;
        y=sectionBar('Stratagems',ML,y,CW,STONE);
        const half=Math.ceil(c.stratagems.length/2);
        const sL=c.stratagems.slice(0,half), sR=c.stratagems.slice(half);
        const xSL=ML+PAD, xSR=ML+COL2+4+PAD;
        let ySL=y, ySR=y;
        for(const s of sL){
          y=ySL;
          sf('bold',6,MGRAY); doc.text(s.type,xSL,y+3); y+=4;
          sf('bold',7.5,DGRAY); doc.text(s.name,xSL,y+3); y+=6.5;
          if(s.effect){ y=wt(s.effect,xSL,y,COL2-PAD*2,LHSM,'italic',7,MGRAY); }
          ySL=y+1.5;
        }
        for(const s of sR){
          y=ySR;
          sf('bold',6,MGRAY); doc.text(s.type,xSR,y+3); y+=4;
          sf('bold',7.5,DGRAY); doc.text(s.name,xSR,y+3); y+=6.5;
          if(s.effect){ y=wt(s.effect,xSR,y,COL2-PAD*2,LHSM,'italic',7,MGRAY); }
          ySR=y+1.5;
        }
        y=Math.max(ySL,ySR)+2;
        setDraw(STONE,0.2); doc.roundedRect(ML,stStartY,CW,y-stStartY,CORNER,CORNER,'S');
        y+=3;
      }

      // ── PAGE FOOTER ──
      sf('normal',6,LGRAY);
      doc.text('Eldfall Chronicles', ML, PH-4);
      doc.text(`Page ${curPage}`, PW-MR, PH-4, {align:'right'});
    }

    // ── BUILD CHARACTER LIST (army + invocable creatures) ──
    const toPrint = [...ARMY];

    // Add creature profiles for any summoner in the army
    const addedCreatures = new Set();
    for(const c of ARMY){
      if(!c.spellcrafts) continue;
      for(const sc of c.spellcrafts){
        const book = SPELLBOOK[sc.code];
        if(!book) continue;
        const conjSpells = book.spells.filter(s=>s.summons && s.level<=sc.level);
        for(const sp of conjSpells){
          const cname = sp.summons;
          if(cname && CREATURES[cname] && !addedCreatures.has(cname)){
            addedCreatures.add(cname);
            toPrint.push(CREATURES[cname]);
          }
        }
      }
    }

    // ── RENDER ALL ──
    toPrint.forEach((c, i) => { if(i>0) curPage=curPage; renderChar(c); });

    // ── SAVE ──
    const faction = document.getElementById('header-faction')
      .textContent.replace(' · Army Viewer','').trim()
      .replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'') || 'army';
    const date = new Date().toISOString().slice(0,10);
    doc.save(`Eldfall_${faction}_${date}.pdf`);

  } catch(e){
    alert('PDF export error: ' + e.message + '\n' + e.stack);
    console.error(e);
  } finally {
    btn.innerHTML = '<span class="icon">📄</span><span>PDF</span>';
    btn.style.opacity = '';
  }
}

function openGlossary(term){
  const desc = GLOSSARY[term] || CLASS_DESC[term] || CLASS_DESC[term.toUpperCase()] || ITEM_CAT_DESC[term] || ITEM_CAT_DESC[term.toUpperCase()];
  if(!desc) return;
  document.getElementById('glossary-modal-term').textContent = term;
  document.getElementById('glossary-modal-desc').textContent = desc;
  const modal = document.getElementById('glossary-modal');
  modal.style.display = 'flex';
}
function closeGlossary(){
  document.getElementById('glossary-modal').style.display = 'none';
}

// ── MARK TERMS ────────────────────────────────────────────────────────────────
const GLOSSARY_TERMS_SORTED = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);

function markTerms(text){
  const terms = GLOSSARY_TERMS_SORTED;
  if(!text) return '';
  // Escape HTML first
  let safe = String(text)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  // Replace known terms with tappable spans
  // Use a placeholder approach to avoid double-replacing
  const placeholders = {};
  let idx = 0;

  for(const term of terms){
    // Match whole word / phrase, case-insensitive
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re = new RegExp(`(?<![\\w-])(${escaped})(?![\\w-])`, 'gi');
    safe = safe.replace(re, (match) => {
      const key = `\x00GLOSS${idx++}\x00`;
      const safeMatch = match.replace(/'/g, "\\'");
      const safeTerm = term.replace(/'/g, "\\'");
      placeholders[key] = `<span class="glossary-term" data-toggle="glossary" data-term="${term}">${match}</span>`;
      return key;
    });
  }

  // Restore placeholders
  for(const [key, val] of Object.entries(placeholders)){
    safe = safe.replace(key, val);
  }
  return safe;
}
